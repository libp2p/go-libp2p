version: "2"

run:
  timeout: 5m

linters:
  enable:
    - revive
    - unused
    - prealloc
  disable:
    - errcheck
    - staticcheck

  disable:
    - errcheck

  settings:
    revive:
      severity: warning
      rules:
        - name: unused-parameter
          severity: warning
          disabled: true

severity:
  default: warning
